<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SIFT Toolbox</title>
    <script>
      (function() {
        try {
          var savedTheme = localStorage.getItem('sift-theme');
          var root = document.documentElement;
          if (savedTheme === 'dark' || (!savedTheme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            root.classList.add('dark');
          } else if (savedTheme === 'light') {
            root.classList.add('light');
          }
        } catch (e) {}
      })();
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Space Mono"', 'monospace'],
              mono: ['"Space Mono"', 'monospace']
            },
            borderRadius: {
              DEFAULT: '4px',
              'none': '0',
              'sm': '4px',
              'md': '4px',
              'lg': '4px',
              'xl': '4px',
              '2xl': '4px',
              '3xl': '4px',
              'full': '9999px'
            }
          }
        }
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
    <style>
      :root {
        /* Theme tokens extracted from image */
        --bg:        #F1EADD;
        --bg2:       #E6DFD1;
        --surface:   #E6DFD1;
        --border-color: #A42A27;
        --border2:   #C24541;
        --amber:     #2B638A;
        --amber-hi:  #3A7CB0;
        --text-color: #262626;
        --text2:     #666666;
        --muted:     #7A8490;
        --dim:       #A3A3A3;
        --red:       #A42A27;
        
        --badge-blue:    #2B638A;
        --badge-green:   #6FA862;
        --badge-red:     #A42A27;
        --badge-neutral: #7A8490;
        --badge-text:    #F1EADD;

        /* App specific mappings */
        --background: var(--bg);
        --background-secondary: var(--bg2);
        --text: var(--text-color);
        --text-light: var(--muted);
        --border: var(--border-color);
        --primary: var(--amber);
        --primary-rgb: 43, 99, 138;
        --primary-text: var(--badge-text);
        --status-success: var(--badge-green);
        --status-error: var(--red);
        --status-warning: var(--amber-hi);
        --f-sans: 'Space Mono', monospace;
        --f-mono: 'Space Mono', monospace;
        --radius: 4px;
      }

      html.dark:root {
        /* Dark mode - Theme extracted from image */
        --bg:        #1A1D27;
        --bg2:       #222634;
        --surface:   #222634;
        --border-color: #A42A27;
        --border2:   #C24541;
        --amber:     #2B638A;
        --amber-hi:  #3A7CB0;
        --text-color: #D1D8E0;
        --text2:     #8F9AA6;
        --muted:     #7A8490;
        --dim:       #4B5563;
        --red:       #A42A27;

        --badge-blue:    #2B638A;
        --badge-green:   #6FA862;
        --badge-red:     #A42A27;
        --badge-neutral: #7A8490;
        --badge-text:    #D1D8E0;

        /* App specific mappings */
        --background: var(--bg);
        --background-secondary: var(--bg2);
        --text: var(--text-color);
        --text-light: var(--text2);
        --border: var(--border-color);
        --primary: var(--amber);
        --primary-rgb: 43, 99, 138;
        --primary-text: var(--badge-text);
        --status-success: var(--badge-green);
        --status-error: var(--red);
        --status-warning: var(--amber-hi);
      }

      @media (prefers-color-scheme: dark) {
        html:not(.light):root {
          --bg:        #1A1D27;
          --bg2:       #222634;
          --surface:   #222634;
          --border-color: #A42A27;
          --border2:   #C24541;
          --amber:     #2B638A;
          --amber-hi:  #3A7CB0;
          --text-color: #D1D8E0;
          --text2:     #8F9AA6;
          --muted:     #7A8490;
          --dim:       #4B5563;
          --red:       #A42A27;

          --badge-blue:    #2B638A;
          --badge-green:   #6FA862;
          --badge-red:     #A42A27;
          --badge-neutral: #7A8490;
          --badge-text:    #D1D8E0;

          --background: var(--bg);
          --background-secondary: var(--bg2);
          --text: var(--text-color);
          --text-light: var(--text2);
          --border: var(--border-color);
          --primary: var(--amber);
          --primary-rgb: 43, 99, 138;
          --primary-text: var(--badge-text);
          --status-success: var(--badge-green);
          --status-error: var(--red);
          --status-warning: var(--amber-hi);
        }
      }

      /* Custom scrollbar for webkit browsers */
      ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-light);
      }

      /* Basic styling for markdown content */
      .markdown-content {
        font-family: var(--f-sans);
        line-height: 1.8;
        font-size: 15px;
        color: var(--text);
      }
      .markdown-content > * + * {
        margin-top: 18px;
      }
      .markdown-content h1, .markdown-content h2, .markdown-content h3, .markdown-content h4 { 
        font-weight: 700; 
        letter-spacing: -.01em;
        line-height: 1.3;
        margin-top: 36px; 
        margin-bottom: 4px; 
        color: var(--text);
      }
      .markdown-content h1 { font-size: 22px; }
      .markdown-content h2 { font-size: 19px; }
      .markdown-content h3 { font-size: 16px; }
      .markdown-content h4 { 
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: .06em;
        color: var(--text-light); 
      }
      .markdown-content h1:first-child,
      .markdown-content h2:first-child,
      .markdown-content h3:first-child,
      .markdown-content h4:first-child {
        margin-top: 0;
      }
      .markdown-content strong { font-weight: 700; }
      .markdown-content em { color: var(--text-light); }
      
      .markdown-content p { margin-bottom: 0; }
      
      .markdown-content ul, .markdown-content ol { 
        padding-left: 1.4em; 
      }
      .markdown-content ul { list-style-type: disc; }
      .markdown-content ol { list-style-type: decimal; }
      .markdown-content li { margin-bottom: 6px; }
      .markdown-content li > p { margin-top: 0; }

      .markdown-content table { 
        border-collapse: collapse;
        width: 100%; 
        font-size: 13px;
        margin: 1.5em 0; 
      }
      .markdown-content th, .markdown-content td { 
        padding: 8px 12px; 
        text-align: left; 
        vertical-align: top;
        border: 1px solid var(--border);
      }
      .markdown-content th { 
        background: var(--background-secondary); 
        font-size: 11px;
        letter-spacing: .04em;
        text-transform: uppercase;
        color: var(--text-light);
        font-weight: 700; 
      }

      .markdown-content blockquote { 
        border-left: 3px solid var(--primary); 
        padding: 12px 18px;
        color: var(--text-light);
        font-style: italic; 
        background: var(--background-secondary);
        border-radius: 0 4px 4px 0;
      }
      .markdown-content blockquote > *:first-child { margin-top: 0; }
      .markdown-content blockquote > *:last-child { margin-bottom: 0; }
      .markdown-content blockquote p { margin: 0; }

      .markdown-content code { 
        background-color: var(--background-secondary); 
        padding: 2px 5px; 
        border-radius: 3px; 
        font-family: var(--f-mono); 
        font-size: 0.88em;
        color: var(--primary);
      }
      .markdown-content pre { 
        background-color: var(--background-secondary); 
        padding: 14px 18px; 
        border-radius: 4px; 
        overflow-x: auto; 
        font-family: var(--f-mono); 
        font-size: 12.5px;
        line-height: 1.7;
        color: var(--text);
        border: 1px solid var(--border);
      }
      .markdown-content pre code { 
        padding: 0; 
        background-color: transparent; 
        border: none;
        color: inherit;
        font-size: 1em;
      }
      .markdown-content a { 
        color: var(--primary); 
        text-decoration: none; 
        border-bottom: 1px solid var(--border);
      }
      .markdown-content a:hover { 
        color: var(--status-warning); 
        border-color: var(--status-warning);
      }
      .markdown-content img { 
        max-width: 100%; 
        height: auto; 
        border-radius: 4px; 
        margin: 1.5em auto;
        display: block;
        background: var(--background-secondary);
        border: 1px solid var(--border);
        padding: 16px;
      }
      
      .markdown-content hr {
        border: none;
        border-top: 1px solid var(--border);
        margin: 32px 0;
      }

      /* Ensure full height for chat layout */
      html, body, #root {
        height: 100%;
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
      body {
        background-color: var(--background);
        color: var(--text);
        font-family: var(--f-sans);
        -webkit-font-smoothing: antialiased;
      }

      /* Thinking Chip Style */
      .thinking-chip {
        display: inline-flex;
        align-items: center;
        background: var(--background-secondary);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 0.85rem;
        color: var(--text-light);
        margin-bottom: 12px;
      }
      .thinking-dot {
        width: 6px;
        height: 6px;
        background-color: var(--primary);
        border-radius: 50%;
        margin-right: 8px;
        animation: thinking-blink 1.4s infinite;
      }
      @keyframes thinking-blink {
        0% { opacity: 0.4; transform: scale(0.8); }
        50% { opacity: 1; transform: scale(1.1); }
        100% { opacity: 0.4; transform: scale(0.8); }
      }
      #root {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
      }

      /* Status Pulse Animation */
      .status-pulse {
        display: inline-block;
        width: 8px;
        height: 8px;
        margin-right: 8px;
        background-color: var(--primary);
        border-radius: 50%;
        animation: pulse-animation 1.5s infinite ease-in-out;
        vertical-align: middle;
      }

      @keyframes pulse-animation {
        0% { transform: scale(0.8); opacity: 0.7; }
        50% { transform: scale(1.1); opacity: 1; }
        100% { transform: scale(0.8); opacity: 0.7; }
      }
      
      /* Mic Pulse Animation */
      @keyframes mic-pulse {
        0% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0.7); }
        70% { box-shadow: 0 0 0 20px rgba(var(--primary-rgb), 0); }
        100% { box-shadow: 0 0 0 0 rgba(var(--primary-rgb), 0); }
      }
      .mic-pulse-animation {
        animation: mic-pulse 2s infinite;
      }


      /* Source highlight animation */
      @keyframes highlight-fade {
        from { background-color: rgba(138, 180, 248, 0.4); box-shadow: 0 0 8px rgba(138, 180, 248, 0.5); }
        to { background-color: transparent; box-shadow: none; }
      }
      .highlight-source { animation: highlight-fade 2s ease-out; border-radius: 4px; }
      
      /* Styles for clickable source indices */
      .source-index { margin-left: 2px; font-size: 0.75em; vertical-align: super; line-height: 1; }
      .source-index-button { background: none; border: none; padding: 0 2px; margin: 0; color: var(--primary); cursor: pointer; text-decoration: none; font-weight: bold; font-family: inherit; font-size: inherit; }
      .source-index-button:hover { text-decoration: underline; filter: brightness(1.2); }

      /* New Utility Classes */
      .bg-main { background-color: var(--background); }
      .bg-content { background-color: var(--background-secondary); }
      .bg-primary { background-color: var(--primary); }
      .bg-border { background-color: var(--border); }
      .bg-status-error { background-color: var(--status-error); }
      .bg-status-error-20 { background-color: rgba(234, 67, 53, 0.2); }
      .hover\:bg-border-hover:hover { background-color: var(--text-light); }
      .text-main { color: var(--text); }
      .text-light { color: var(--text-light); }
      .text-on-primary { color: var(--primary-text); }
      .text-primary-accent { color: var(--primary); }
      .text-status-success { color: var(--status-success); }
      .text-status-warning { color: var(--status-warning); }
      .text-status-error { color: var(--status-error); }
      .border-ui { border-color: var(--border); }
      .border-primary { border-color: var(--primary); }
      .border-status-error { border-color: var(--status-error); }
      .accent-primary { accent-color: var(--primary); }
      .focus\:border-primary:focus { border-color: var(--primary); }
      .focus\:ring-primary:focus { --tw-ring-color: var(--primary); }
      .focus\:ring-status-error:focus { --tw-ring-color: var(--status-error); }
      .ring-offset-main { --tw-ring-offset-color: var(--background); }
      .ring-offset-content { --tw-ring-offset-color: var(--background-secondary); }
      .placeholder-light::placeholder { color: var(--text-light); opacity: 0.7; }

      /* ── Focus states ── */
      :focus-visible {
        outline: 2px solid var(--amber);
        outline-offset: 2px;
      }

      a { color: inherit; text-decoration: none; }

      /* ── Badge pills ── */
      .badge-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: .06em;
        text-transform: uppercase;
        color: var(--badge-text);
        padding: 4px 10px;
        border-radius: 4px;
        line-height: 1.4;
      }

      .badge-blue    { background: var(--badge-blue); }
      .badge-red     { background: var(--badge-red); }
      .badge-green   { background: var(--badge-green); }
      .badge-neutral { background: var(--badge-neutral); }

      /* ── Field note card ── */
      .field-note {
        background: var(--bg);
        border: 1px solid var(--text-color);
        border-radius: 4px;
        padding: 24px 28px;
      }

      .field-note-meta {
        font-size: 10px;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: var(--muted);
        margin-bottom: 14px;
      }

      .field-note-title {
        font-size: 22px;
        font-weight: 700;
        letter-spacing: -.01em;
        margin-bottom: 16px;
      }

      .field-note .badge-row {
        margin-bottom: 16px;
      }

      .field-note-body {
        font-size: 14px;
        line-height: 1.7;
        color: var(--text-color);
        margin-bottom: 16px;
      }

      .field-note-body:last-child {
        margin-bottom: 0;
      }

      .code-panel {
        background: var(--bg2);
        border-radius: 4px;
        padding: 12px 16px;
        font-size: 12px;
        line-height: 1.8;
        margin-bottom: 16px;
      }

      .code-cmd {
        color: var(--amber);
      }

      .code-output {
        color: var(--text2);
      }
    </style>
